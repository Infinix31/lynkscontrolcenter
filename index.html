<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="TASKS">
<meta name="theme-color" content="#0a0a0a">
<title>TASKS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0a;--s1:#111;--s2:#181818;--s3:#222;
  --border:#252525;--border2:#303030;
  --text:#e8e4dc;--muted:#666;--dim:#444;
  --accent:#f0c040;--accent-dark:#a88020;
  --green:#4caf50;--red:#ef5350;--blue:#42a5f5;
  --done:#383830;--done-text:#555;
}
html,body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;height:100%;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh}

/* ── SETUP SCREEN ── */
#setup{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding:2rem;gap:1.5rem;background:var(--bg)}
#setup.hidden{display:none}
.setup-title{font-size:3rem;font-weight:800;color:var(--accent);letter-spacing:-0.04em;line-height:1}
.setup-sub{font-family:'Space Mono',monospace;font-size:0.7rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-top:0.25rem}
.setup-card{background:var(--s1);border:1px solid var(--border2);border-radius:12px;padding:2rem;width:100%;max-width:480px;display:flex;flex-direction:column;gap:1.2rem}
.setup-card label{font-family:'Space Mono',monospace;font-size:0.65rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:0.4rem}
.setup-card input{width:100%;background:var(--s2);border:1px solid var(--border2);color:var(--text);font-family:'Space Mono',monospace;font-size:0.85rem;padding:0.85rem 1rem;border-radius:8px;outline:none;transition:border-color 0.15s}
.setup-card input:focus{border-color:var(--accent)}
.setup-card input::placeholder{color:var(--dim)}
.setup-hint{font-family:'Space Mono',monospace;font-size:0.6rem;color:var(--muted);line-height:1.8;margin-top:-0.4rem}
.setup-hint a{color:var(--blue);text-decoration:none}
.setup-btn{background:var(--accent);color:#0a0a0a;font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;letter-spacing:-0.02em;padding:1rem;border:none;border-radius:8px;cursor:pointer;width:100%;margin-top:0.5rem;transition:opacity 0.15s}
.setup-btn:active{opacity:0.8}

/* ── STATUS BAR ── */
#statusbar{
  display:none;flex-shrink:0;
  background:var(--s1);border-bottom:1px solid var(--border);
  padding:0 1.5rem;height:44px;
  align-items:center;justify-content:space-between;
}
#statusbar.visible{display:flex}
.sb-left{display:flex;align-items:center;gap:0.75rem}
.sb-title{font-size:1.1rem;font-weight:800;color:var(--accent);letter-spacing:-0.03em}
.sb-right{display:flex;align-items:center;gap:0.75rem}
#sync-status{font-family:'Space Mono',monospace;font-size:0.62rem;letter-spacing:0.08em;display:flex;align-items:center;gap:0.4rem}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dot.synced{background:var(--green)}
.dot.syncing{background:var(--accent);animation:pulse 0.8s infinite}
.dot.offline{background:var(--dim)}
.dot.error{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.sync-btn{background:transparent;border:1px solid var(--border2);color:var(--muted);font-family:'Space Mono',monospace;font-size:0.6rem;letter-spacing:0.08em;padding:0.3rem 0.7rem;border-radius:999px;cursor:pointer;transition:all 0.15s}
.sync-btn:hover{color:var(--text);border-color:var(--border2)}

/* ── INPUT BAR ── */
#inputbar{display:none;flex-shrink:0;background:var(--s1);border-bottom:1px solid var(--border);padding:0.9rem 1.5rem;gap:0.75rem;align-items:stretch}
#inputbar.visible{display:flex}
#task-input{flex:1;background:var(--s2);border:1px solid var(--border2);color:var(--text);font-family:'Syne',sans-serif;font-size:1rem;padding:0.8rem 1rem;border-radius:8px;outline:none;transition:border-color 0.15s;min-width:0}
#task-input:focus{border-color:var(--accent)}
#task-input::placeholder{color:var(--dim)}
#tag-select{background:var(--s2);border:1px solid var(--border2);color:var(--muted);font-family:'Space Mono',monospace;font-size:0.65rem;padding:0.8rem 0.75rem;border-radius:8px;outline:none;cursor:pointer;appearance:none;width:100px;letter-spacing:0.05em}
.add-btn{background:var(--accent);color:#0a0a0a;border:none;font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;padding:0.8rem 1.4rem;border-radius:8px;cursor:pointer;letter-spacing:-0.02em;white-space:nowrap;transition:opacity 0.1s}
.add-btn:active{opacity:0.8}

/* ── FILTERS ── */
#filters{display:none;flex-shrink:0;padding:0.6rem 1.5rem;border-bottom:1px solid var(--border);gap:0.4rem;overflow-x:auto;scrollbar-width:none}
#filters.visible{display:flex}
#filters::-webkit-scrollbar{display:none}
.f-btn{background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'Space Mono',monospace;font-size:0.6rem;letter-spacing:0.1em;padding:0.35rem 0.85rem;border-radius:999px;cursor:pointer;white-space:nowrap;transition:all 0.15s;text-transform:uppercase}
.f-btn.active{background:var(--accent);color:#0a0a0a;border-color:var(--accent);font-weight:700}

/* ── TASK LIST ── */
#tasklist{display:none;flex:1;overflow-y:auto;padding:0 1.5rem 5rem;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
#tasklist.visible{display:block}
#tasklist::-webkit-scrollbar{width:4px}
#tasklist::-webkit-scrollbar-thumb{background:var(--border)}

.section-header{font-family:'Space Mono',monospace;font-size:0.58rem;letter-spacing:0.15em;color:var(--dim);text-transform:uppercase;padding:1.2rem 0 0.5rem;border-bottom:1px solid var(--border);margin-bottom:0}

.task-item{display:flex;align-items:flex-start;gap:0.9rem;padding:0.95rem 0;border-bottom:1px solid var(--border);animation:fadeIn 0.18s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

.check{width:24px;height:24px;min-width:24px;border:1.5px solid var(--border2);border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:3px;transition:all 0.15s;background:transparent;flex-shrink:0}
.check:active{transform:scale(0.9)}
.task-item.done .check{background:var(--accent);border-color:var(--accent)}
.checkmark{display:none;width:12px;height:12px}
.task-item.done .checkmark{display:block}

.task-body{flex:1;min-width:0}
.task-text{font-size:1rem;font-weight:400;line-height:1.45;color:var(--text);word-break:break-word;transition:color 0.2s}
.task-item.done .task-text{text-decoration:line-through;color:var(--done-text)}
.task-meta{display:flex;align-items:center;gap:0.4rem;margin-top:0.3rem;flex-wrap:wrap}
.tag{font-family:'Space Mono',monospace;font-size:0.58rem;letter-spacing:0.08em;padding:2px 7px;border-radius:999px;border:1px solid;text-transform:uppercase}
.tag-work{color:#7eb8f7;border-color:#1a3a5c;background:#0a1e30}
.tag-personal{color:#c4b5f5;border-color:#3a2a6a;background:#1a1030}
.tag-ideas{color:#f5d67a;border-color:#5a4010;background:#201800}
.tag-urgent{color:#ff8a80;border-color:#6a1a1a;background:#2a0808}
.task-time{font-family:'Space Mono',monospace;font-size:0.55rem;color:var(--muted);opacity:0.5}

.del-btn{background:transparent;border:none;color:var(--dim);font-size:1.1rem;width:34px;height:34px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:color 0.15s;margin-top:0}
.del-btn:hover,.del-btn:active{color:var(--red)}

/* ── EMPTY ── */
.empty{text-align:center;padding:4rem 1rem;font-family:'Space Mono',monospace;font-size:0.7rem;color:var(--muted);line-height:2.2;display:none}
.empty.show{display:block}
.empty-icon{font-size:2.5rem;margin-bottom:1rem;opacity:0.2}

/* ── BOTTOM BAR ── */
#bottombar{display:none;position:fixed;bottom:0;left:0;right:0;padding:0.8rem 1.5rem;background:linear-gradient(transparent,var(--bg) 50%);justify-content:space-between;align-items:center}
#bottombar.visible{display:flex}
.count-text{font-family:'Space Mono',monospace;font-size:0.6rem;color:var(--muted)}
.count-text b{color:var(--accent)}
.clear-btn{background:transparent;border:1px solid var(--border);color:var(--dim);font-family:'Space Mono',monospace;font-size:0.6rem;letter-spacing:0.08em;padding:0.4rem 1rem;border-radius:999px;cursor:pointer;transition:all 0.15s}
.clear-btn:hover{color:var(--red);border-color:var(--red)}
</style>
</head>
<body>

<!-- SETUP SCREEN -->
<div id="setup">
  <div>
    <div class="setup-title">TASKS</div>
    <div class="setup-sub">— first time setup</div>
  </div>
  <div class="setup-card">
    <div>
      <label>GitHub Username</label>
      <input id="s-user" type="text" placeholder="advaith" autocomplete="off" autocorrect="off" autocapitalize="off" />
    </div>
    <div>
      <label>Repository Name</label>
      <input id="s-repo" type="text" placeholder="tasks" autocomplete="off" autocorrect="off" autocapitalize="off" />
    </div>
    <div>
      <label>Personal Access Token</label>
      <input id="s-token" type="password" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off" />
      <p class="setup-hint">
        Go to <a href="https://github.com/settings/tokens" target="_blank">github.com/settings/tokens</a><br>
        → Generate new token (classic) → tick <b>repo</b> → copy it here
      </p>
    </div>
    <button class="setup-btn" onclick="saveSetup()">LET'S GO →</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div id="statusbar">
    <div class="sb-left">
      <div class="sb-title">TASKS</div>
    </div>
    <div class="sb-right">
      <div id="sync-status">
        <div class="dot offline" id="sync-dot"></div>
        <span id="sync-label">OFFLINE</span>
      </div>
      <button class="sync-btn" onclick="manualSync()">SYNC</button>
    </div>
  </div>

  <div id="inputbar">
    <input type="text" id="task-input" placeholder="What needs to be done?" autocomplete="off" autocorrect="off" />
    <select id="tag-select">
      <option value="">— tag</option>
      <option value="work">WORK</option>
      <option value="personal">PERSONAL</option>
      <option value="ideas">IDEAS</option>
      <option value="urgent">URGENT</option>
    </select>
    <button class="add-btn" onclick="addTask()">+ ADD</button>
  </div>

  <div id="filters">
    <button class="f-btn active" onclick="setFilter('all',this)">ALL</button>
    <button class="f-btn" onclick="setFilter('active',this)">ACTIVE</button>
    <button class="f-btn" onclick="setFilter('done',this)">DONE</button>
    <button class="f-btn" onclick="setFilter('work',this)">WORK</button>
    <button class="f-btn" onclick="setFilter('personal',this)">PERSONAL</button>
    <button class="f-btn" onclick="setFilter('ideas',this)">IDEAS</button>
    <button class="f-btn" onclick="setFilter('urgent',this)">URGENT</button>
  </div>

  <div id="tasklist">
    <div class="empty" id="empty">
      <div class="empty-icon">○</div>
      nothing here.<br>add something above.
    </div>
  </div>

  <div id="bottombar">
    <span class="count-text"><b id="active-count">0</b> remaining · <span id="done-count">0</span> done</span>
    <button class="clear-btn" onclick="clearDone()">clear completed</button>
  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────
const API = 'https://api.github.com';
let cfg = {};
let tasks = [];
let filter = 'all';
let syncTimer = null;
let sha = null;

function getConfig() {
  return {
    user: localStorage.getItem('gh_user'),
    repo: localStorage.getItem('gh_repo'),
    token: localStorage.getItem('gh_token')
  };
}

function isConfigured() {
  const c = getConfig();
  return c.user && c.repo && c.token;
}

// ── SETUP ────────────────────────────────────────────────
function saveSetup() {
  const user = document.getElementById('s-user').value.trim();
  const repo = document.getElementById('s-repo').value.trim();
  const token = document.getElementById('s-token').value.trim();
  if (!user || !repo || !token) { alert('Fill in all fields.'); return; }
  localStorage.setItem('gh_user', user);
  localStorage.setItem('gh_repo', repo);
  localStorage.setItem('gh_token', token);
  init();
}

// ── GITHUB API ───────────────────────────────────────────
async function ghFetch(path, method = 'GET', body = null) {
  const { user, repo, token } = getConfig();
  const url = `${API}/repos/${user}/${repo}/contents/${path}`;
  const opts = {
    method,
    headers: {
      'Authorization': `token ${token}`,
      'Accept': 'application/vnd.github.v3+json',
      'Content-Type': 'application/json'
    }
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(url, opts);
  if (!res.ok && res.status !== 404) throw new Error(`GitHub ${res.status}`);
  return res.status === 404 ? null : res.json();
}

async function loadFromGitHub() {
  setSyncStatus('syncing');
  try {
    const data = await ghFetch('tasks.json');
    if (!data) {
      await pushToGitHub();
      setSyncStatus('synced');
      return;
    }
    sha = data.sha;
    const parsed = JSON.parse(atob(data.content.replace(/\n/g, '')));
    tasks = parsed.tasks || [];
    localStorage.setItem('tasks_cache', JSON.stringify(tasks));
    localStorage.setItem('tasks_sha', sha);
    setSyncStatus('synced');
    render();
  } catch (e) {
    setSyncStatus('error');
    loadFromCache();
  }
}

async function pushToGitHub() {
  setSyncStatus('syncing');
  try {
    const { user, repo, token } = getConfig();
    const currentSha = sha || localStorage.getItem('tasks_sha');
    const payload = {
      tasks,
      lastUpdated: new Date().toISOString()
    };
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(payload, null, 2))));
    const body = { message: 'sync: update tasks', content };
    if (currentSha) body.sha = currentSha;
    const res = await fetch(`${API}/repos/${user}/${repo}/contents/tasks.json`, {
      method: 'PUT',
      headers: {
        'Authorization': `token ${token}`,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error('push failed');
    const data = await res.json();
    sha = data.content.sha;
    localStorage.setItem('tasks_sha', sha);
    localStorage.setItem('tasks_cache', JSON.stringify(tasks));
    setSyncStatus('synced');
  } catch (e) {
    setSyncStatus('error');
  }
}

function loadFromCache() {
  const cached = localStorage.getItem('tasks_cache');
  if (cached) { tasks = JSON.parse(cached); render(); }
}

function schedulePush() {
  clearTimeout(syncTimer);
  syncTimer = setTimeout(() => {
    if (navigator.onLine) pushToGitHub();
    else setSyncStatus('offline');
  }, 1500);
}

function manualSync() {
  if (navigator.onLine) loadFromGitHub();
  else setSyncStatus('offline');
}

// ── SYNC STATUS ──────────────────────────────────────────
function setSyncStatus(state) {
  const dot = document.getElementById('sync-dot');
  const label = document.getElementById('sync-label');
  dot.className = 'dot ' + state;
  const labels = { synced:'SYNCED', syncing:'SYNCING...', offline:'OFFLINE', error:'SYNC ERROR' };
  label.textContent = labels[state] || state.toUpperCase();
}

// ── TASKS ────────────────────────────────────────────────
function addTask() {
  const input = document.getElementById('task-input');
  const tag = document.getElementById('tag-select');
  const text = input.value.trim();
  if (!text) { input.focus(); return; }
  tasks.unshift({
    id: Date.now(),
    text,
    tag: tag.value,
    done: false,
    created: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
  });
  input.value = '';
  tag.value = '';
  render();
  schedulePush();
  input.focus();
}

function toggle(id) {
  const t = tasks.find(t => t.id === id);
  if (t) { t.done = !t.done; render(); schedulePush(); }
}

function del(id) {
  tasks = tasks.filter(t => t.id !== id);
  render();
  schedulePush();
}

function clearDone() {
  tasks = tasks.filter(t => !t.done);
  render();
  schedulePush();
}

function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

// ── RENDER ───────────────────────────────────────────────
function render() {
  const list = document.getElementById('tasklist');
  const empty = document.getElementById('empty');

  const filtered = tasks.filter(t => {
    if (filter === 'active') return !t.done;
    if (filter === 'done') return t.done;
    if (['work','personal','ideas','urgent'].includes(filter)) return t.tag === filter;
    return true;
  });

  const active = tasks.filter(t => !t.done).length;
  const done = tasks.filter(t => t.done).length;
  document.getElementById('active-count').textContent = active;
  document.getElementById('done-count').textContent = done;

  list.querySelectorAll('.task-item, .section-header').forEach(el => el.remove());

  if (filtered.length === 0) {
    empty.classList.add('show');
    return;
  }
  empty.classList.remove('show');

  const activeTasks = filtered.filter(t => !t.done);
  const doneTasks = filtered.filter(t => t.done);

  activeTasks.forEach(t => list.appendChild(makeEl(t)));

  if (doneTasks.length > 0 && activeTasks.length > 0) {
    const h = document.createElement('div');
    h.className = 'section-header';
    h.textContent = `completed · ${doneTasks.length}`;
    list.appendChild(h);
  }
  doneTasks.forEach(t => list.appendChild(makeEl(t)));
}

function makeEl(t) {
  const div = document.createElement('div');
  div.className = 'task-item' + (t.done ? ' done' : '');
  div.innerHTML = `
    <div class="check" onclick="toggle(${t.id})">
      <svg class="checkmark" viewBox="0 0 12 12" fill="none">
        <path d="M1.5 6l3.5 3.5 5.5-7" stroke="#0a0a0a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="task-body">
      <div class="task-text">${esc(t.text)}</div>
      <div class="task-meta">
        ${t.tag ? `<span class="tag tag-${t.tag}">${t.tag}</span>` : ''}
        <span class="task-time">${t.created}</span>
      </div>
    </div>
    <button class="del-btn" onclick="del(${t.id})">✕</button>
  `;
  return div;
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── SHOW MAIN APP ────────────────────────────────────────
function showApp() {
  document.getElementById('setup').classList.add('hidden');
  ['statusbar','inputbar','filters','tasklist','bottombar'].forEach(id => {
    document.getElementById(id).classList.add('visible');
  });
}

// ── INIT ─────────────────────────────────────────────────
function init() {
  if (!isConfigured()) return;
  showApp();
  sha = localStorage.getItem('tasks_sha');
  loadFromCache();
  if (navigator.onLine) loadFromGitHub();
  else setSyncStatus('offline');

  window.addEventListener('online', () => loadFromGitHub());
  window.addEventListener('offline', () => setSyncStatus('offline'));

  document.getElementById('task-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });
}

// ── REGISTER SW ──────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}

init();
</script>
</body>
</html>
